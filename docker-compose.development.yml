services:
  api:
    build:
      context: .
      dockerfile: dockerfile.api
    ports:
      - "5001:443"
    environment:
      - "ConnectionStrings__DefaultConnection=Server=sql;Database=WebShop;User Id=sa;Password=Password@1;TrustServerCertificate=true;MultipleActiveResultSets=true"
      - "ConnectionStrings__Redis=redis:6379,password=devredis123"
      - "ASPNETCORE_ENVIRONMENT=Development"
      - "ASPNETCORE_URLS=https://+:443"
      - "ASPNETCORE_Kestrel__Certificates__Default__Path=/https/localhost.pem"
      - "ASPNETCORE_Kestrel__Certificates__Default__KeyPath=/https/localhost-key.pem"
      - "DEFAULT_USER_PASSWORD=Pa$$w0rd"
      - "JsReport__Url=http://jsreport:5488"
      - "Cors__AllowedOrigins__0=https://localhost:4200"
      - "Cors__AllowedOrigins__1=https://localhost"
      - "Cors__AllowedOrigins__2=http://localhost:4200"
    volumes:
      - ./ssl:/https:ro
    depends_on:
      sql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - webshop-network

  frontend:
    build:
      context: .
      dockerfile: dockerfile.development.frontend
    ports:
      - "4200:443"
    volumes:
      - ./client/nginx.dev.conf:/etc/nginx/nginx.conf:ro
      - ./client/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
    networks:
      - webshop-network

  sql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Password@1"
      MSSQL_PID: "Express"
    platform: linux/amd64
    ports:
      - "1433:1433"
    volumes:
      - sql-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P Password@1 -Q 'SELECT 1' || exit 0"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - webshop-network

  redis:
    build:
      context: .
      dockerfile: dockerfile.development.redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - webshop-network

  jsreport:
    image: jsreport/jsreport:latest
    ports:
      - "5488:5488"
    environment:
      - "extensions_authentication_enabled=false"
      - "extensions_assets_allowedFiles=**/*.+(js|css|html|jpg|jpeg|png|svg|ttf)"
      - "allowLocalFilesAccess=true"
    volumes:
      - jsreport-data:/jsreport
    networks:
      - webshop-network

networks:
  webshop-network:
    driver: bridge

volumes:
  sql-data:
  redis-data:
  jsreport-data: