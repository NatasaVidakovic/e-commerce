name: Trigger auto deployment for webshop-api

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/webshop-api-AutoDeployTrigger-8df97f47-ea97-444e-9bc0-a9ce1d9be05c.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.WEBSHOPAPI_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.WEBSHOPAPI_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.WEBSHOPAPI_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: .                    # Root repo
          dockerfilePath: dockerfile.api      # API Dockerfile
          registryUrl: webshopacr.azurecr.io
          registryUsername: ${{ secrets.WEBSHOPAPI_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.WEBSHOPAPI_REGISTRY_PASSWORD }}
          containerAppName: webshop-api
          resourceGroup: WebShopRG
          imageToBuild: webshopacr.azurecr.io/webshop-api:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


