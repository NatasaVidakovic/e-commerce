@if (products && products.length > 0) {
<div class="flex flex-col gap-3">
    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3 sm:gap-4">
        @for (product of products; track product.id) {
        <app-product-item [product]="product" [isFavourite]="true" (favoriteToggled)="onFavouriteToggled($event)"></app-product-item>
        }
    </div>
</div>
} @else {
<app-empty-state message="{{ 'MESSAGES.EMPTY_FAVOURITES' | translate }}" icon="favorite_border" ></app-empty-state>
}
