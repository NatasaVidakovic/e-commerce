<div class="mt-5 flex justify-center gap-4">
  <button (click)="get500Error()" mat-stroked-button>{{ 'TEST_ERROR.TEST_500' | translate }}</button>
  <button (click)="get404Error()" mat-stroked-button>{{ 'TEST_ERROR.TEST_404' | translate }}</button>
  <button (click)="get400Error()" mat-stroked-button>{{ 'TEST_ERROR.TEST_400' | translate }}</button>
  <button (click)="get401Error()" mat-stroked-button>{{ 'TEST_ERROR.TEST_401' | translate }}</button>
  <button (click)="get400ValidationError()" mat-stroked-button>{{ 'TEST_ERROR.TEST_400_VALIDATION' | translate }}</button>
</div>

@if (validationErrors) {
  <div class="mx-auto max-w-lg mt-5 bg-red-100">
    <ul class="space-y-2 p-2">
      @for (error of validationErrors; track $index) {
        <li class="text-red-800">{{error}}</li>
      }
    </ul>
  </div>
}
