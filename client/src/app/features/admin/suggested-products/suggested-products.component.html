<div class="admin-dashboard px-6 pt-6">

  <!-- Page Header -->
  <div class="page-header-row">
    <h2 class="text-2xl font-semibold">{{ 'ADMIN.SUGGESTED_PRODUCTS' | translate }}</h2>
    <div class="header-actions">
      <button mat-stroked-button color="primary" (click)="productsTab?.openAddFromExistingDialog()">
        <mat-icon>playlist_add</mat-icon>
        {{ 'PRODUCT.ADD' | translate }}
      </button>
      @if (selectedProduct) {
        <button mat-stroked-button color="warn" (click)="productsTab?.deleteSelected()">
          <mat-icon>delete</mat-icon>
          {{ 'COMMON.DELETE' | translate }}
        </button>
      }
      <button mat-stroked-button color="primary" (click)="loadProducts()">
        <mat-icon>refresh</mat-icon>
        {{ 'COMMON.REFRESH' | translate }}
      </button>
    </div>
  </div>

  <!-- Filter Bar - Full Width -->
  <div class="filter-bar-container">
    <app-dynamic-filter-bar
      [filterDefinitions]="filterDefinitions"
      [sortOptions]="sortOptions"
      [liveFiltering]="false"
      [minPriceRange]="minPrice"
      [maxPriceRange]="maxPrice"
      (changed)="onDynamicChanged($event)"
      (reset)="onDynamicReset()">
    </app-dynamic-filter-bar>
  </div>

  <!-- Products Display -->
  <div class="products-container">
    <!-- Desktop Table View -->
    <div class="desktop-view">
      <products-tab
        #productsTab
        [products]="products"
        [brands]="brands"
        [types]="types"
        [isAdmin]="true"
        [enableAddFromExisting]="true"
        [enableEdit]="false"
        [serverSide]="true"
        [totalCount]="totalCount"
        [pageNumber]="pageNumber"
        [pageSize]="pageSize"
        [showInternalFilters]="false"
        [showActionBar]="false"
        (selectedProductChange)="selectedProduct = $event"
        (productUpdated)="onProductUpdated()"
        (productDeleted)="onProductDeleted($event)"
        (addFromExisting)="onAddFromExisting($event)"
        (pageChanged)="onPageChanged($event)">
      </products-tab>
    </div>

    <!-- Mobile Card View -->
    <div class="mobile-view">
      <div class="products-grid">
        <div class="product-card" *ngFor="let product of products; trackBy: trackByProductId">
          <div class="card-image">
            <img [src]="product.pictureUrl" [alt]="'PRODUCT.IMAGE_ALT' | translate: { name: product.name }"
                 (error)="$any($event.target).src = 'images/placeholder.png'; $any($event.target).onerror = null">
          </div>
          <div class="card-content">
            <h3 class="product-name">{{ product.name }}</h3>
            <p class="product-brand" *ngIf="product.brand">{{ product.brand }}</p>
            <div class="card-price">{{ product.price | appCurrency }}</div>
            <div class="card-type" *ngIf="product.productType?.name || product.type">
              {{ product.productType?.name || product.type }}
            </div>
          </div>
        </div>
      </div>

      <!-- Mobile Pagination -->
      <app-pagination
        [length]="totalCount"
        [pageSize]="pageSize"
        [pageIndex]="pageNumber - 1"
        [pageSizeOptions]="[10, 25, 50, 100]"
        [showFirstLastButtons]="true"
        (page)="onPageChanged($event)">
      </app-pagination>
    </div>
  </div>

</div>
