<h2 mat-dialog-title class="flex items-center gap-2">
  <mat-icon>history</mat-icon>
  Voucher Status History - {{ data.voucherCode }}
</h2>

<mat-dialog-content class="min-w-[500px]">
  <div *ngIf="loading" class="text-center py-8">
    <p>Loading history...</p>
  </div>

  <div *ngIf="!loading && history.length === 0" class="text-center py-8" style="color: var(--color-text-secondary);">
    No status changes recorded for this voucher.
  </div>

  <div *ngIf="!loading && history.length > 0" class="overflow-auto">
    <table mat-table [dataSource]="history" class="w-full">
      <ng-container matColumnDef="changedAt">
        <th mat-header-cell *matHeaderCellDef class="px-4 py-2">Date & Time</th>
        <td mat-cell *matCellDef="let item" class="px-4 py-2">
          {{ item.changedAt | date:'short' }}
        </td>
      </ng-container>

      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef class="px-4 py-2">Status</th>
        <td mat-cell *matCellDef="let item" class="px-4 py-2">
          <span class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-semibold"
                [class.bg-green-100]="item.isActive" 
                [class.text-green-800]="item.isActive"
                [class.bg-red-100]="!item.isActive" 
                [class.text-red-800]="!item.isActive">
            {{ item.isActive ? 'Active' : 'Inactive' }}
          </span>
        </td>
      </ng-container>

      <ng-container matColumnDef="changedBy">
        <th mat-header-cell *matHeaderCellDef class="px-4 py-2">Changed By</th>
        <td mat-cell *matCellDef="let item" class="px-4 py-2">
          {{ item.changedBy || 'System' }}
        </td>
      </ng-container>

      <ng-container matColumnDef="reason">
        <th mat-header-cell *matHeaderCellDef class="px-4 py-2">Reason</th>
        <td mat-cell *matCellDef="let item" class="px-4 py-2">
          {{ item.reason || '-' }}
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Close</button>
</mat-dialog-actions>
