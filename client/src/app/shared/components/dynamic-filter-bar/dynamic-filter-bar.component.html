<div [formGroup]="form" class="filter-bar-wrapper">
  <!-- Mobile Filter Toggle Button -->
  <button class="mobile-filter-toggle" (click)="toggleMobileDrawer()">
    <mat-icon>filter_list</mat-icon>
    <span>{{ 'FILTER.FILTERS' | translate }}</span>
    @if (activeFilterCount > 0) {
    <span class="filter-count">{{ activeFilterCount }}</span>
    }
  </button>

  <!-- Desktop Horizontal Filter Bar -->
  <div class="desktop-filters">

    <!-- Main Row: Search + Advanced Filters Button + Sort By -->
    <div class="filter-main-row">

      <!-- Search Field -->
      <div *ngIf="searchDefinition && form.contains(searchDefinition.key)" class="filter-search-field">
        <mat-icon class="search-icon-inline">search</mat-icon>
        <input
          type="text"
          [formControlName]="searchDefinition.key"
          [placeholder]="searchDefinition.label"
          class="search-input" />
      </div>

      <!-- Right Controls -->
      <div class="filter-right-controls">

        <!-- Advanced Filters Toggle -->
        <button
          type="button"
          class="advanced-filters-btn"
          [class.active]="advancedFiltersOpen"
          (click)="toggleAdvancedFilters()">
          <mat-icon>tune</mat-icon>
          <span>Advanced Filters</span>
          <span *ngIf="activeFilterCount > 0" class="adv-filter-badge">{{ activeFilterCount }}</span>
        </button>

        <!-- Sort By -->
        <div *ngIf="sortOptions.length > 0" class="filter-sort-group">
          <span class="sort-label">Sort By:</span>
          <div class="sort-select-wrapper">
            <select
              class="sort-select"
              (change)="onSortSelectChange($event)">
              <option
                *ngFor="let o of sortOptions; index as i"
                [value]="i"
                [selected]="selectedSortIndex === i">
                {{ o.label }}
              </option>
            </select>
            <mat-icon class="sort-arrow-icon">expand_more</mat-icon>
          </div>
        </div>

        <!-- View Layout Toggle -->
        <div *ngIf="showViewLayoutToggle" class="view-toggle-group">
          <button
            type="button"
            class="view-toggle-btn"
            [class.active]="viewLayout === 'grid'"
            (click)="onViewLayoutChange('grid')"
            [attr.aria-label]="'ARIA_LABELS.GRID_VIEW' | translate">
            <mat-icon>grid_view</mat-icon>
          </button>
          <button
            type="button"
            class="view-toggle-btn"
            [class.active]="viewLayout === 'list'"
            (click)="onViewLayoutChange('list')"
            [attr.aria-label]="'ARIA_LABELS.LIST_VIEW' | translate">
            <mat-icon>view_list</mat-icon>
          </button>
        </div>

      </div>
    </div>

    <!-- Advanced Filters Panel (expandable) -->
    <div class="filter-advanced-panel" *ngIf="advancedFiltersOpen">

      <div class="filter-dropdowns-row">
        <ng-container *ngFor="let d of panelFilterDefinitions">
          <!-- Skip maxPrice — rendered together with minPrice as price range -->
          <ng-container *ngIf="d.key !== 'maxPrice'">

            <!-- Single Select -->
            <div *ngIf="d.controlType === 'select' && !d.multiple" class="filter-dropdown-group">
              <label class="filter-col-label">{{ d.label | uppercase }}</label>
              <div class="select-wrapper">
                <select [formControlName]="d.key" class="filter-native-select">
                  <option value="">{{ d.allLabel || 'All' }}</option>
                  <option *ngFor="let o of (d.options || [])" [value]="o">{{ o }}</option>
                </select>
                <mat-icon class="select-arrow-icon">expand_more</mat-icon>
              </div>
            </div>

            <!-- Multiple Select -->
            <div *ngIf="d.controlType === 'select' && d.multiple" class="filter-dropdown-group">
              <label class="filter-col-label">{{ d.label | uppercase }}</label>
              <mat-form-field appearance="outline" class="filter-mat-field">
                <mat-select [formControlName]="d.key" multiple [placeholder]="d.allLabel || 'All'">
                  <mat-option *ngFor="let o of (d.options || [])" [value]="o">{{ o }}</mat-option>
                </mat-select>
              </mat-form-field>
            </div>

            <!-- Price Range (minPrice + maxPrice combined) -->
            <div *ngIf="d.key === 'minPrice' && hasPriceRange()" class="filter-dropdown-group filter-price-range">
              <label class="filter-col-label">PRICE RANGE</label>
              <div class="price-inputs-row">
                <input type="number" formControlName="minPrice" class="filter-number-input" placeholder="Min" />
                <span class="price-sep">–</span>
                <input type="number" formControlName="maxPrice" class="filter-number-input" placeholder="Max" />
              </div>
            </div>

            <!-- Standalone Number (not part of price range) -->
            <div *ngIf="d.controlType === 'number' && !(d.key === 'minPrice' && hasPriceRange())" class="filter-dropdown-group">
              <label class="filter-col-label">{{ d.label | uppercase }}</label>
              <input type="number" [formControlName]="d.key" class="filter-number-input" [placeholder]="d.label" />
            </div>

            <!-- Standalone Text (non-search) -->
            <div *ngIf="d.controlType === 'text'" class="filter-dropdown-group">
              <label class="filter-col-label">{{ d.label | uppercase }}</label>
              <div class="select-wrapper">
                <input type="text" [formControlName]="d.key" class="filter-text-input" [placeholder]="d.label" />
              </div>
            </div>

            <!-- Date -->
            <div *ngIf="d.controlType === 'date'" class="filter-dropdown-group">
              <label class="filter-col-label">{{ d.label | uppercase }}</label>
              <mat-form-field appearance="outline" class="filter-mat-field">
                <input matInput [matDatepicker]="deskDatePicker" [formControlName]="d.key">
                <mat-datepicker-toggle matSuffix [for]="deskDatePicker"></mat-datepicker-toggle>
                <mat-datepicker #deskDatePicker></mat-datepicker>
              </mat-form-field>
            </div>

            <!-- Date Range -->
            <div *ngIf="d.controlType === 'dateRange'" class="filter-dropdown-group filter-dropdown-wide">
              <label class="filter-col-label">{{ d.label | uppercase }}</label>
              <div class="date-range-inline">
                <mat-form-field appearance="outline" class="date-range-field" [class.date-field-error]="isDateRangeInvalid(d.key)">
                  <mat-label>From</mat-label>
                  <input matInput [matDatepicker]="advStartPicker"
                    [formControlName]="d.key + 'Start'"
                    [max]="getMaxStartDate(d.key)"
                    placeholder="Start">
                  <mat-datepicker-toggle matSuffix [for]="advStartPicker"></mat-datepicker-toggle>
                  <mat-datepicker #advStartPicker></mat-datepicker>
                </mat-form-field>
                <span class="date-range-sep">–</span>
                <mat-form-field appearance="outline" class="date-range-field" [class.date-field-error]="isDateRangeInvalid(d.key)">
                  <mat-label>To</mat-label>
                  <input matInput [matDatepicker]="advEndPicker"
                    [formControlName]="d.key + 'End'"
                    [min]="getMinEndDate(d.key)"
                    placeholder="End">
                  <mat-datepicker-toggle matSuffix [for]="advEndPicker"></mat-datepicker-toggle>
                  <mat-datepicker #advEndPicker></mat-datepicker>
                </mat-form-field>
              </div>
              <div *ngIf="isDateRangeInvalid(d.key)" class="date-range-error">
                <mat-icon>error_outline</mat-icon>
                <span>"To" date must be after "From" date</span>
              </div>
            </div>

          </ng-container>
        </ng-container>
      </div>

      <!-- Actions Row -->
      <div class="filter-actions">
        <button type="button" class="filter-clear-btn" (click)="onReset()">
          Clear Filters
        </button>
        <button
          mat-flat-button
          color="primary"
          type="button"
          class="filter-apply-btn"
          [disabled]="hasAnyInvalidDateRange()"
          [matTooltip]="hasAnyInvalidDateRange() ? 'End date must be after start date' : ''"
          (click)="applyFilters()">
          Apply Filters
        </button>
      </div>

    </div>
  </div>

  <!-- Mobile Filter Drawer -->
  <div class="mobile-drawer-overlay" [class.open]="mobileDrawerOpen" (click)="closeMobileDrawer()"></div>
  
  <div class="mobile-drawer" [class.open]="mobileDrawerOpen">
    <div class="mobile-drawer-header">
      <h2>Filters</h2>
      <button class="close-btn" (click)="closeMobileDrawer()">
        <mat-icon>close</mat-icon>
      </button>
    </div>
    
    <div class="mobile-drawer-content">
      <!-- Search field -->
      <div *ngIf="searchDefinition && form.contains(searchDefinition.key)" class="mb-4">
        <mat-form-field appearance="outline" class="w-full">
          <mat-label>{{ searchDefinition.label }}</mat-label>
          <input matInput type="text" [formControlName]="searchDefinition.key" />
          <mat-icon matSuffix style="color: var(--color-text-disabled);">search</mat-icon>
        </mat-form-field>
      </div>

      <!-- Sort dropdown -->
      <div *ngIf="sortOptions.length > 0" class="mb-4">
        <mat-form-field appearance="outline" class="w-full">
          <mat-label>Sort By</mat-label>
          <mat-select formControlName="sort" panelClass="modern-select-panel">
            <mat-option *ngFor="let o of sortOptions; index as i" [value]="i">
              {{ o.label }}
            </mat-option>
          </mat-select>
        </mat-form-field>
      </div>

      <!-- Filter sections -->
      <div class="space-y-2">
        <ng-container *ngFor="let d of panelFilterDefinitions">
          <ng-container *ngIf="d.key !== 'minPrice' && d.key !== 'maxPrice'">
            <div class="rounded-lg overflow-hidden" style="border: 1px solid var(--color-border-primary);">
              <button type="button" class="filter-section-toggle w-full flex items-center justify-between p-3 transition-colors"
                (click)="toggleFilterSection(d.key)">
                <div class="flex items-center gap-2">
                  <span class="text-sm font-medium">{{ d.label }}</span>
                  <span *ngIf="hasValue(d.key)"
                    class="inline-flex items-center justify-center min-w-[20px] h-5 px-1.5 text-xs font-semibold bg-blue-100 text-blue-700 rounded-full">
                    ✓
                  </span>
                </div>
                <mat-icon class="transition-transform" style="color: var(--color-text-disabled);" [class.rotate-180]="isFilterSectionOpen(d.key)">
                  expand_more
                </mat-icon>
              </button>

              <div *ngIf="isFilterSectionOpen(d.key)" class="p-3 pt-0" style="border-top: 1px solid var(--color-border-primary);">
                <div *ngIf="d.controlType === 'select'" class="space-y-2">
                  <div *ngIf="d.multiple" class="max-h-48 overflow-y-auto space-y-1">
                    <label *ngFor="let o of (d.options || [])"
                      class="filter-option-row flex items-center gap-2 p-2 rounded cursor-pointer">
                      <input type="checkbox" [value]="o" [checked]="isOptionSelected(d.key, o)"
                        (change)="toggleOption(d.key, o)"
                        class="filter-checkbox w-4 h-4 text-blue-600 rounded">
                      <span class="text-sm">{{ o }}</span>
                    </label>
                  </div>
                  <div *ngIf="!d.multiple" class="max-h-48 overflow-y-auto space-y-1">
                    <label *ngFor="let o of (d.options || [])"
                      class="filter-option-row flex items-center gap-2 p-2 rounded cursor-pointer">
                      <input
                        type="radio"
                        [name]="d.key"
                        [checked]="form.get(d.key)?.value === o"
                        (change)="form.get(d.key)?.setValue(o)"
                        class="filter-radio w-4 h-4">
                      <span class="text-sm">{{ o }}</span>
                    </label>
                  </div>
                </div>

                <mat-form-field *ngIf="d.controlType === 'number'" appearance="outline" class="w-full">
                  <input matInput type="number" [formControlName]="d.key" placeholder="{{ 'FILTER.ENTER_VALUE' | translate }}" />
                </mat-form-field>

                <mat-form-field *ngIf="d.controlType === 'text'" appearance="outline" class="w-full">
                  <input matInput type="text" [formControlName]="d.key" placeholder="{{ 'FILTER.ENTER_VALUE' | translate }}" />
                </mat-form-field>

                <!-- Date field -->
                <mat-form-field
                  *ngIf="d.controlType === 'date'"
                  appearance="outline"
                  class="w-full">
                  <mat-label>{{ d.label }}</mat-label>
                  <input matInput [matDatepicker]="mobileDatePicker" [formControlName]="d.key">
                  <mat-datepicker-toggle matSuffix [for]="mobileDatePicker"></mat-datepicker-toggle>
                  <mat-datepicker #mobileDatePicker></mat-datepicker>
                </mat-form-field>

                <!-- Date Range field -->
                <div *ngIf="d.controlType === 'dateRange'">
                  <div class="date-range-inline">
                    <mat-form-field appearance="outline" class="date-range-field"
                      [class.date-field-error]="isDateRangeInvalid(d.key)">
                      <mat-label>From</mat-label>
                      <input matInput [matDatepicker]="mobileStartDatePicker"
                        [formControlName]="d.key + 'Start'"
                        [max]="getMaxStartDate(d.key)"
                        placeholder="Start">
                      <mat-datepicker-toggle matSuffix [for]="mobileStartDatePicker"></mat-datepicker-toggle>
                      <mat-datepicker #mobileStartDatePicker></mat-datepicker>
                    </mat-form-field>
                    <span class="date-range-sep">–</span>
                    <mat-form-field appearance="outline" class="date-range-field"
                      [class.date-field-error]="isDateRangeInvalid(d.key)">
                      <mat-label>To</mat-label>
                      <input matInput [matDatepicker]="mobileEndDatePicker"
                        [formControlName]="d.key + 'End'"
                        [min]="getMinEndDate(d.key)"
                        placeholder="End">
                      <mat-datepicker-toggle matSuffix [for]="mobileEndDatePicker"></mat-datepicker-toggle>
                      <mat-datepicker #mobileEndDatePicker></mat-datepicker>
                    </mat-form-field>
                  </div>
                  <div *ngIf="isDateRangeInvalid(d.key)" class="date-range-error">
                    <mat-icon>error_outline</mat-icon>
                    <span>"To" date must be after "From" date</span>
                  </div>
                </div>

                <button *ngIf="d.controlType === 'dateRange' ? hasDateRangeValue(d.key) : hasValue(d.key)" type="button"
                  class="w-full mt-2 flex items-center justify-center gap-1 px-3 py-1.5 text-xs text-blue-600 hover:text-blue-800 hover:bg-blue-50 rounded transition-colors"
                  (click)="d.controlType === 'dateRange' ? clearDateRange(d.key) : clearFilter(d.key)">
                  <mat-icon class="text-sm">close</mat-icon>
                  <span>{{ 'FILTER.CLEAR' | translate }} {{ d.label }}</span>
                </button>
              </div>
            </div>
          </ng-container>

          <ng-container *ngIf="d.key === 'minPrice' && hasPriceRange()">
            <div class="rounded-lg overflow-hidden" style="border: 1px solid var(--color-border-primary);">
              <button type="button" class="filter-section-toggle w-full flex items-center justify-between p-3 transition-colors"
                (click)="toggleFilterSection('priceRange')">
                <div class="flex items-center gap-2">
                  <span class="text-sm font-medium">{{ 'FILTER.PRICE_RANGE' | translate }}</span>
                  <span *ngIf="hasValue('minPrice') || hasValue('maxPrice')"
                    class="inline-flex items-center justify-center min-w-[20px] h-5 px-1.5 text-xs font-semibold bg-blue-100 text-blue-700 rounded-full">
                    ✓
                  </span>
                </div>
                <mat-icon class="transition-transform" style="color: var(--color-text-disabled);" [class.rotate-180]="isFilterSectionOpen('priceRange')">
                  expand_more
                </mat-icon>
              </button>

              <div *ngIf="isFilterSectionOpen('priceRange')" class="p-4 pt-2" style="border-top: 1px solid var(--color-border-primary);">
                <div class="relative px-2 py-6">
                  <div class="relative h-2 price-range-track">
                    <div class="absolute w-full h-2 rounded-full" style="background-color: var(--color-bg-tertiary);"></div>
                    <div class="absolute h-2 bg-gradient-to-r from-blue-500 to-blue-600 rounded-full transition-all duration-200"
                      [style.left.%]="getPriceRangeLeft()" [style.width.%]="getPriceRangeWidth()">
                    </div>
                    <input type="range" [min]="minPriceRange" [max]="getPriceMax()" step="10"
                      [value]="getPriceMin()" (input)="onMinPriceSliderChange($event)"
                      class="absolute w-full h-2 appearance-none bg-transparent cursor-pointer range-slider top-0"
                      style="z-index: 3;">
                    <input type="range" [min]="minPriceRange" [max]="getPriceMax()" step="10"
                      [value]="getPriceMaxValue()" (input)="onMaxPriceSliderChange($event)"
                      class="absolute w-full h-2 appearance-none bg-transparent cursor-pointer range-slider top-0"
                      style="z-index: 4;">
                  </div>
                  <div class="flex justify-between mt-2 text-xs">
                    <span>{{ getPriceMin() }}</span>
                    <span>{{ getPriceMaxValue() }}</span>
                  </div>
                </div>

                <button *ngIf="hasValue('minPrice') || hasValue('maxPrice')" type="button"
                  class="w-full mt-2 flex items-center justify-center gap-1 px-3 py-1.5 text-xs text-blue-600 hover:text-blue-800 hover:bg-blue-50 rounded transition-colors"
                  (click)="clearPriceRange()">
                  <mat-icon class="text-sm">close</mat-icon>
                  <span>Clear {{ 'FILTER.PRICE_RANGE' | translate }}</span>
                </button>
              </div>
            </div>
          </ng-container>
        </ng-container>
      </div>
    </div>
    
    <div class="mobile-drawer-footer">
      <button mat-stroked-button type="button" class="flex-1" (click)="onReset()">
        Clear All
      </button>
      <button mat-flat-button color="primary" type="button" class="flex-1"
        [disabled]="hasAnyInvalidDateRange()"
        [matTooltip]="hasAnyInvalidDateRange() ? 'End date must be after start date' : ''"
        (click)="applyMobileFilters()">
        Apply Filters
      </button>
    </div>
  </div>
</div>
