@if (busyService.busyRequestCount === 0) {
<div class="max-w-screen-xl mx-auto mt-32 px-10 py-4 rounded-lg shadow-md w-full" style="background-color: var(--color-surface);">
    <div class="flex flex-col items-center justify-center py-12 w-full">
        <mat-icon class="icon-display mb-8">{{ icon() }}</mat-icon>

        <p class="text-lg font-semibold mb-4" style="color: var(--color-text-secondary);">
            {{ message() }}
        </p>

        @if (actionText()) {
            <button mat-flat-button (click)="onAction()">
                {{ actionText() }}
            </button>
        }
    </div>
</div>
}
